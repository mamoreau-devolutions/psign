name: ci-unix

on:
  push:
  pull_request:

jobs:
  fmt-and-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (rustfmt, clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: rustfmt
        run: cargo fmt --all --check

      - name: Cargo.lock consistency
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: clippy (portable digest + trust + Azure REST crates)
        run: cargo clippy -p signtool-sip-digest -p signtool-digest-cli -p signtool-authenticode-trust -p signtool-codesigning-rest -p signtool-azure-kv-rest --all-targets --locked -- -D warnings

      - name: clippy (digest-cli with artifact-signing-rest)
        run: cargo clippy -p signtool-digest-cli --all-targets --features artifact-signing-rest --locked -- -D warnings

      - name: clippy (digest-cli with azure-kv-sign-portable)
        run: cargo clippy -p signtool-digest-cli --all-targets --features azure-kv-sign-portable --locked -- -D warnings

      - name: clippy (signtool-rs portable lib)
        run: cargo clippy -p signtool-rs --lib --locked -- -D warnings

      - name: SIP digest crate tests (no Win32)
        run: cargo test -p signtool-sip-digest --lib --locked

      - name: Authenticode trust crate tests (no Win32)
        run: cargo test -p signtool-authenticode-trust --lib --locked

      - name: Codesigning REST crate tests (no Win32)
        run: cargo test -p signtool-codesigning-rest --lib --locked

      - name: Azure KV REST crate tests (no Win32)
        run: cargo test -p signtool-azure-kv-rest --locked

      - name: Portable digest CLI (integration smoke)
        run: cargo test -p signtool-digest-cli --locked

      - name: Portable digest CLI (artifact-signing-rest subcommand)
        run: cargo test -p signtool-digest-cli --features artifact-signing-rest --locked

      - name: Portable digest CLI (azure-kv-sign-portable subcommand)
        run: cargo test -p signtool-digest-cli --features azure-kv-sign-portable --locked

      - name: Check signtool-rs stub binary + portable lib
        run: cargo check -p signtool-rs --bins --lib --locked

      - name: Portable lib unit tests (native argv / response files)
        run: cargo test -p signtool-rs --lib --locked
